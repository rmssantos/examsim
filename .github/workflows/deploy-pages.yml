name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Inject analytics connection string
        env:
          APPINSIGHTS_CONNECTION_STRING: ${{ secrets.EXAMSIM_APPINSIGHTS_CONNECTION_STRING }}
        run: |
          if [ -z "$APPINSIGHTS_CONNECTION_STRING" ]; then
            echo "Missing EXAMSIM_APPINSIGHTS_CONNECTION_STRING secret" >&2
            exit 1
          fi
            python tools/inject-analytics-secret.py

      - name: Generate per-exam SEO pages
        run: python tools/generate-exam-pages.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
