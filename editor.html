<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Exam Simulator - Create and edit exam questions with the built-in editor">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📝</text></svg>">
  <title>Question Editor - Create & Edit Exams</title>
  <link href="assets/vendor/fontawesome/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/editor-styles.css">
</head>
<body>
  <div class="editor-container">
    <div class="editor-header">
      <h1><i aria-hidden="true" class="fas fa-pen-ruler"></i> Question Editor</h1>
      <div class="editor-header-actions">
        <a href="index.html" class="btn btn-outline"><i aria-hidden="true" class="fas fa-arrow-left"></i> Back</a>
        <button class="editor-theme-toggle" id="editorThemeToggle" title="Toggle theme" aria-label="Toggle theme">
          <i aria-hidden="true" class="fas fa-moon" id="editorThemeIcon"></i>
        </button>
      </div>
    </div>

    <!-- Exam Selection Bar -->
    <div class="exam-selection-bar">
      <div class="exam-select-group">
        <label for="examSelect"><i aria-hidden="true" class="fas fa-book"></i> Exam</label>
        <select id="examSelect">
          <option value="">Loading exams...</option>
        </select>
      </div>

      <div class="exam-actions-group">
        <div class="custom-exam-input">
          <input id="customExamCode" type="text" placeholder="Exam code (e.g., myexam)" aria-label="Custom exam code"/>
          <button id="loadCustomExam" class="btn btn-secondary" title="Load custom exam" aria-label="Load custom exam"><i aria-hidden="true" class="fas fa-folder-open"></i> Load</button>
          <button id="newExamBtn" class="btn btn-secondary" title="Create a new custom exam" aria-label="Create new exam"><i aria-hidden="true" class="fas fa-plus-circle"></i> New</button>
        </div>
      </div>
    </div>

    <div class="split">
      <!-- Sidebar with Questions List -->
      <div class="sidebar">
        <div class="sidebar-header">
          <h3><i aria-hidden="true" class="fas fa-list"></i> Questions</h3>
          <input id="searchInput" type="text" placeholder="Search questions..." aria-label="Search questions"/>

          <div class="sidebar-filters">
            <select id="filterType" aria-label="Filter by question type">
              <option value="">All Types</option>
              <option value="STANDARD">Single Choice</option>
              <option value="MULTI">Multiple Choice</option>
              <option value="SEQUENCE">Sequence</option>
              <option value="DRAG_DROP_SELECT">Drag & Drop</option>
              <option value="YES_NO_MATRIX">Yes/No Matrix</option>
            </select>
            <select id="filterCategory" aria-label="Filter by category">
              <option value="">All Categories</option>
            </select>
          </div>

          <button id="addNew" class="btn primary editor-full-width-action">
            <i aria-hidden="true" class="fas fa-plus"></i> New Question
          </button>
        </div>

        <div class="list" id="questionList"></div>

        <div class="sidebar-footer">
          <div class="exam-management">
            <h4><i aria-hidden="true" class="fas fa-cog"></i> Exam Management</h4>
            <button id="importJson" class="btn btn-outline" title="Import questions from JSON file">
              <i aria-hidden="true" class="fas fa-file-import"></i> Import Questions
            </button>
            <button id="exportJson" class="btn btn-outline" title="Export all questions to JSON">
              <i aria-hidden="true" class="fas fa-file-export"></i> Export Questions
            </button>
            <button id="clearOverride" class="btn btn-danger" title="Reset all custom changes to original exam">
              <i aria-hidden="true" class="fas fa-undo"></i> Reset to Original
            </button>
          </div>
        </div>
      </div>
      <div class="right-pane">
      <div class="form">
        <div class="form-header">
          <span class="form-header-title" id="formTitle">Edit Question</span>
          <span class="form-header-status"><i aria-hidden="true" class="fas fa-check-circle"></i> Saved</span>
        </div>
        <div id="editorValidation" class="editor-validation editor-validation-ok" role="status" aria-live="polite">
          <i aria-hidden="true" class="fas fa-shield-alt"></i>
          <span id="editorValidationText">Question is valid</span>
        </div>

        <div class="form-meta-row">
          <div class="row">
            <label for="qType"><i aria-hidden="true" class="fas fa-list"></i> Type</label>
            <select id="qType">
              <option value="STANDARD">Single Choice</option>
              <option value="MULTI">Multiple Choice</option>
              <option value="SEQUENCE">Sequence</option>
              <option value="DRAG_DROP_SELECT">Drag & Drop</option>
              <option value="YES_NO_MATRIX">Yes/No Matrix</option>
            </select>
          </div>
          <div class="row">
            <label for="qModule"><i aria-hidden="true" class="fas fa-folder"></i> Module</label>
            <input id="qModule" type="text" placeholder="e.g., Security Concepts"/>
          </div>
          <div class="row">
            <label for="qId"><i aria-hidden="true" class="fas fa-hashtag"></i> ID</label>
            <input id="qId" type="number" placeholder="Auto"/>
          </div>
        </div>

        <div class="row">
          <label for="qText"><i aria-hidden="true" class="fas fa-pen"></i> Question</label>
          <textarea id="qText" placeholder="Type your question here..."></textarea>
        </div>
        <div class="row">
          <label for="qExplanation"><i aria-hidden="true" class="fas fa-lightbulb"></i> Explanation</label>
          <textarea id="qExplanation" placeholder="Explain the correct answer..."></textarea>
        </div>

        <div class="section-title">Images</div>
        <div class="grid2">
          <div>
            <label class="small" for="qImages">Question images (filenames relative to images/, one per line)</label>
            <textarea id="qImages" placeholder="question_image1.png"></textarea>
            <div class="inline-actions">
              <input id="qImgFiles" type="file" accept=".jpg,.jpeg,.png,.gif,.webp,image/jpeg,image/png,image/gif,image/webp" multiple aria-label="Upload question images" title="Upload question images" />
              <button id="qImgUpload" class="btn"><i aria-hidden="true" class="fas fa-upload"></i> Upload</button>
            </div>
          </div>
          <div>
            <label class="small" for="eImages">Explanation images (filenames relative to images/, one per line)</label>
            <textarea id="eImages" placeholder="explanation_image1.png"></textarea>
            <div class="inline-actions">
              <input id="eImgFiles" type="file" accept=".jpg,.jpeg,.png,.gif,.webp,image/jpeg,image/png,image/gif,image/webp" multiple aria-label="Upload explanation images" title="Upload explanation images" />
              <button id="eImgUpload" class="btn"><i aria-hidden="true" class="fas fa-upload"></i> Upload</button>
            </div>
          </div>
        </div>

        <div class="section-title"><i aria-hidden="true" class="fas fa-list"></i> Answer Options</div>
        <div id="sequenceHint" class="is-hidden">
          <strong><i aria-hidden="true" class="fas fa-info-circle"></i> Sequence:</strong> Use the Preview panel below to set the correct order with the Up/Down arrows.
        </div>
        <div id="options" class="options"></div>
        <div class="footer">
          <button id="addOption" class="btn primary"><i aria-hidden="true" class="fas fa-plus"></i> Add Option</button>
          <span id="optionsHelp" class="small editor-help-text">Check the boxes next to correct answers</span>
        </div>
        <div class="row is-hidden"><label for="qCorrect">Correct</label><input id="qCorrect" type="text" placeholder="Auto-managed"/></div>
        <div class="row is-hidden" id="ddSelectRow"><label for="qDragSelectN">Select N</label><input id="qDragSelectN" type="number" min="1" placeholder="Count"/></div>
        <div class="row is-hidden" id="ynMatrixRow"><label for="qStatements">Statements</label><textarea id="qStatements" placeholder="One per line"></textarea></div>

        <div class="form-footer">
          <button id="save" class="btn primary"><i aria-hidden="true" class="fas fa-save"></i> Save Local Changes</button>
          <button id="deleteCurrent" class="btn danger"><i aria-hidden="true" class="fas fa-trash"></i> Delete</button>
          <span class="small editor-save-status" id="saveStatus">✓ Saved</span>
        </div>
      </div>
      <div class="preview" id="preview">
        <h3>Preview</h3>
        <div id="pvType" class="pv-type">STANDARD</div>
        <div id="pvQuestion" class="pv-question"></div>
        <div id="pvQImages" class="pv-images"></div>
        <div id="pvOptions" class="pv-options"></div>
        <div id="pvExplanation" class="pv-explanation editor-preview-explanation"></div>
        <div id="pvEImages" class="pv-images"></div>
      </div>
      </div>
    </div>
  </div>

  <input id="fileInput" class="is-hidden" type="file" accept="application/json" aria-label="Import exam JSON file" />

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/exam-manager.js"></script>
  <script src="assets/js/exam-loader.js"></script>
  <script>
    // Initialize dynamic exam list in editor
    async function initializeEditorExamList() {
      // Wait for exam data (falls back immediately if loader unavailable)
      const loadPromise = window.examsLoadedPromise || Promise.resolve();
      await loadPromise;

      const examSelect = document.getElementById('examSelect');

      try {
        // Load available exams
        const exams = await window.examManager.detectAvailableExams();

        // Clear loading option
        examSelect.innerHTML = '';

        if (exams.size === 0) {
          examSelect.innerHTML = '<option value="">No exams available</option>';
          return;
        }

        let selectedExamId = null;

        // Add available exams
        exams.forEach((examData, examId) => {
          const option = document.createElement('option');
          option.value = examId;
          option.textContent = `${examData.metadata.name} (${examData.questions.length} questions)`;
          examSelect.appendChild(option);
          if (!selectedExamId) {
            selectedExamId = examId;
          }
        });

        // Add custom option
        const customOption = document.createElement('option');
        customOption.value = 'custom';
        customOption.textContent = 'Custom (loaded)';
        examSelect.appendChild(customOption);

        // Select first detected exam by default
        if (selectedExamId) {
          examSelect.value = selectedExamId;
        }

        document.dispatchEvent(new CustomEvent('editorExamListReady', {
          detail: { defaultExamId: selectedExamId }
        }));

      } catch (error) {
        console.error('Failed to load exams in editor:', error);
        examSelect.innerHTML = '<option value="">Error loading exams</option>';
      }
    }

    // Theme toggle for editor
    function initEditorTheme() {
      const toggle = document.getElementById('editorThemeToggle');
      const icon = document.getElementById('editorThemeIcon');
      const saved = localStorage.getItem('theme');

      if (saved === 'dark' || (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.body.classList.add('dark-mode');
        if (icon) icon.className = 'fas fa-sun';
      }

      if (toggle) {
        toggle.addEventListener('click', () => {
          document.body.classList.toggle('dark-mode');
          const isDark = document.body.classList.contains('dark-mode');
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
          if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        });
      }
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', () => {
      initEditorTheme();
      initializeEditorExamList();
    });
  </script>
  <script src="assets/js/editor.js"></script>
</body>
</html>
