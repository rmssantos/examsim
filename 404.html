<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/media/favicon-64.png">
  <title>Examplar | Page not found</title>
</head>
<body>
  <p>Opening Exam Simulator...</p>
  <script>
    (function () {
      var segments = window.location.pathname.split('/').filter(Boolean);
      var routeIndex = segments.findIndex(function (segment) {
        return segment === 'editor' || segment === 'exam' || segment === 'study' || segment === 'privacy-and-storage';
      });
      var base = '/' + (routeIndex > 0 ? segments.slice(0, routeIndex).join('/') + '/' : '');
      var route = routeIndex >= 0 ? segments[routeIndex] : '';
      var params = new URLSearchParams(window.location.search);
      var target = 'index.html';

      if (route === 'editor') {
        target = 'editor.html';
      } else if (route === 'exam' || route === 'study') {
        target = 'exam.html';
        if (route === 'study' && !params.has('mode')) params.set('mode', 'study');
      } else if (route === 'privacy-and-storage') {
        target = 'privacy-and-storage.html';
      }

      var query = params.toString();
      window.location.replace(base + target + (query ? '?' + query : ''));
    })();
  </script>
</body>
</html>
